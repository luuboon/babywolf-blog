<mat-toolbar class="topbar">
  <div class="brand">BABYWOLF BLOG</div>

  <div class="search-container">
    <input type="text" placeholder="Search..." (input)="onSearch($event)" />
  </div>

  <span class="spacer"></span>

  <nav class="nav" aria-label="Navegación principal">
    <a mat-button routerLink="/">Home</a>
    <a mat-button routerLink="/posts">Posts</a>
    
    @if (!currentUser()) {
      <a mat-button routerLink="/auth/login">Login</a>
    } @else {
      @if (isAdmin()) {
        <a mat-button routerLink="/admin/posts" color="accent">Admin</a>
      }
      <button mat-button (click)="logout()">Logout</button>
    }
  </nav>

</mat-toolbar>
