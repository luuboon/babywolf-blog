<div class="admin-page">
  <!-- Greeting -->
  <div class="greeting-section">
    <div class="greeting-text">
      <h1 class="greeting-title">Panel de Control</h1>
      <p class="greeting-sub">Bienvenido al centro de administración de BabyWolf Blog 🐺</p>
    </div>
  </div>

  <!-- Stats Grid -->
  <div class="stats-grid" *ngIf="!loading">
    <div *ngFor="let stat of stats" class="stat-card" [ngClass]="stat.gradient">
      <div class="stat-icon">{{ stat.icon }}</div>
      <div class="stat-info">
        <div class="stat-value">{{ stat.value }}</div>
        <div class="stat-label">{{ stat.title }}</div>
      </div>
      <div class="stat-glow"></div>
    </div>
  </div>

  <div *ngIf="loading" class="stats-grid">
    <div *ngFor="let i of [1,2,3,4]" class="stat-card stat-skeleton">
      <div class="skeleton-pulse"></div>
    </div>
  </div>

  <!-- Quick Actions -->
  <h2 class="section-heading">Acceso Rápido</h2>
  <div class="actions-grid">
    <div *ngFor="let action of quickActions" class="action-card">
      <div class="action-icon">{{ action.icon }}</div>
      <h3 class="action-title">{{ action.title }}</h3>
      <p class="action-desc">{{ action.desc }}</p>
      <a [routerLink]="action.link" class="action-btn">
        {{ action.btnText }}
        <span class="arrow">→</span>
      </a>
    </div>
  </div>
</div>
