<div class="admin-page">
  <div class="page-header">
    <div>
      <a routerLink="/admin/posts" class="btn-back">← Volver</a>
    </div>
    <div>
      <h1 class="page-title">Nuevo Post</h1>
      <p class="page-subtitle">Crea un nuevo artículo para el blog</p>
    </div>
    <div></div>
  </div>

  <!-- Error -->
  <div *ngIf="errorMsg" class="admin-error">
    ⚠️ {{ errorMsg }}
  </div>

  <!-- Form -->
  <div class="editor-card">
    <div class="form-group">
      <label class="form-label">Título</label>
      <input type="text" [(ngModel)]="title" class="admin-input" placeholder="Ej: Bienvenidos al Blog 🎮" />
    </div>

    <div class="form-group">
      <label class="form-label">Imagen de Portada</label>
      <div class="file-upload-zone">
        <input type="file" (change)="onFileSelected($event)" accept="image/*" class="file-input" [disabled]="uploadingImage" id="cover-file" />
        <label for="cover-file" class="file-label" [class.uploading]="uploadingImage">
          <span *ngIf="!uploadingImage && !coverUrl">📷 Seleccionar imagen</span>
          <span *ngIf="uploadingImage">⏳ Subiendo imagen...</span>
          <span *ngIf="coverUrl && !uploadingImage">✅ Imagen cargada — Click para cambiar</span>
        </label>
      </div>
      <div *ngIf="coverUrl" class="cover-preview">
        <img [src]="coverUrl" alt="Cover preview" />
      </div>
    </div>

    <div class="form-group">
      <label class="form-label">Contenido</label>
      <textarea [(ngModel)]="content" class="admin-input" rows="10" placeholder="Escribe tu contenido aquí..."></textarea>
    </div>

    <button class="btn-primary btn-publish" (click)="savePost()" [disabled]="isSubmitting || uploadingImage">
      {{ isSubmitting ? '⏳ Guardando...' : '🚀 Publicar Post' }}
    </button>
  </div>
</div>
