<div class="admin-dashboard">
  <div class="header-section" style="margin-bottom: var(--spacing-md)">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: var(--spacing-lg)">
      <a routerLink="/admin" class="neo-btn" style="width: auto; display: inline-block;">&larr; Volver</a>
      <h1 style="margin: 0; font-size: 2rem;">Gestión de Usuarios</h1>
      <div style="width: 100px;"></div> <!-- spacer -->
    </div>
  </div>

  <div *ngIf="loading" style="text-align: center; margin: var(--spacing-xl) 0;">
    Cargando usuarios...
  </div>
  
  <div *ngIf="errorMsg" class="error-alert">
    {{ errorMsg }}
  </div>

  <div *ngIf="!loading && !errorMsg" class="neo-card" style="padding: 0; overflow: hidden;">
    <table style="width: 100%; border-collapse: collapse; text-align: left;">
      <thead style="background-color: var(--color-primary); color: var(--color-surface); font-family: var(--font-heading);">
        <tr>
          <th style="padding: var(--spacing-md);">Email</th>
          <th style="padding: var(--spacing-md);">Rol</th>
          <th style="padding: var(--spacing-md);">Fecha Registro</th>
          <th style="padding: var(--spacing-md); text-align: center;">Acciones</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let user of users" style="border-bottom: var(--border-width) solid var(--color-border);">
          <td style="padding: var(--spacing-md);">{{ user.email }}</td>
          <td style="padding: var(--spacing-md);">
            <span [style.color]="user.role === 'admin' ? 'red' : 'inherit'" style="font-weight: bold;">
              {{ user.role | uppercase }}
            </span>
          </td>
          <td style="padding: var(--spacing-md);">{{ user.created_at | date }}</td>
          <td style="padding: var(--spacing-md); display: flex; gap: var(--spacing-sm); justify-content: center;">
            <button class="neo-btn secondary" (click)="toggleRole(user)" style="padding: var(--spacing-xs) var(--spacing-sm); font-size: 0.8rem;">
              {{ user.role === 'admin' ? 'Quitar Admin' : 'Hacer Admin' }}
            </button>
            <button class="neo-btn" (click)="deleteUser(user.id)" style="padding: var(--spacing-xs) var(--spacing-sm); font-size: 0.8rem; background-color: #ffcccc; color: #cc0000; border-color: #cc0000;">
              Eliminar
            </button>
          </td>
        </tr>
        <tr *ngIf="users.length === 0">
          <td colspan="4" style="padding: var(--spacing-xl); text-align: center;">
            No hay usuarios registrados o no tienes permisos.
          </td>
        </tr>
      </tbody>
    </table>
  </div>
</div>
