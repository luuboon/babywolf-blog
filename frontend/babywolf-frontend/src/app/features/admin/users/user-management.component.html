<div class="admin-page">
  <div class="page-header">
    <div>
      <a routerLink="/admin" class="btn-back">← Volver</a>
    </div>
    <div>
      <h1 class="page-title">Gestión de Usuarios</h1>
      <p class="page-subtitle">Administra los usuarios registrados en el blog</p>
    </div>
    <div></div>
  </div>

  <!-- Loading -->
  <div *ngIf="loading" class="admin-loading">
    <div class="spinner"></div>
    <span>Cargando usuarios...</span>
  </div>

  <!-- Error -->
  <div *ngIf="errorMsg" class="admin-error">
    ⚠️ {{ errorMsg }}
  </div>

  <!-- Table -->
  <div *ngIf="!loading && !errorMsg" class="admin-table-wrapper">
    <table class="admin-table">
      <thead>
        <tr>
          <th>Email</th>
          <th>Rol</th>
          <th>Fecha Registro</th>
          <th style="text-align: right;">Acciones</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let user of users">
          <td>
            <span style="font-weight: 600;">{{ user.email }}</span>
          </td>
          <td>
            <span class="badge" [ngClass]="user.role === 'admin' ? 'badge-admin' : 'badge-user'">
              {{ user.role === 'admin' ? '🛡️ Admin' : '👤 User' }}
            </span>
          </td>
          <td style="color: var(--admin-text-muted);">{{ user.created_at | date:'mediumDate' }}</td>
          <td>
            <div class="table-actions">
              <button class="btn-secondary" (click)="toggleRole(user)">
                {{ user.role === 'admin' ? 'Quitar Admin' : 'Hacer Admin' }}
              </button>
              <button class="btn-danger" (click)="deleteUser(user.id)">
                🗑 Eliminar
              </button>
            </div>
          </td>
        </tr>
        <tr *ngIf="users.length === 0">
          <td colspan="4" class="table-empty">
            <div class="empty-icon">👥</div>
            <div>No hay usuarios registrados.</div>
          </td>
        </tr>
      </tbody>
    </table>
  </div>
</div>
