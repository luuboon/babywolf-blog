<div class="posts-container">
    <header class="page-header">
        <h1 class="page-title">Retro Gaming Thoughts</h1>
        <p class="page-subtitle">Opinions on bits, bytes, and blast processing.</p>
    </header>

    @if (state.isLoading()) {
    <div class="loading-state">
        <p>Loading cartridges...</p>
    </div>
    } @else if (state.error()) {
    <div class="error-state">
        <p>{{ state.error() }}</p>
    </div>
    } @else {
    <div class="posts-grid">
        @for (post of state.posts(); track post.id) {
        <app-post-card [post]="post"></app-post-card>
        } @empty {
        <p>No posts found.</p>
        }
    </div>
    }
</div>
