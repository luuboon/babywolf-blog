<div class="auth-container">
  <div class="neo-card">
    <h2>Crear Cuenta</h2>
    
    <div *ngIf="errorMsg" class="error-alert">
      {{ errorMsg }}
    </div>
    
    <div *ngIf="successMsg" class="success-alert">
      {{ successMsg }}
    </div>

    <form [formGroup]="registerForm" (ngSubmit)="onSubmit()" *ngIf="!successMsg">
      <div class="form-group">
        <label for="email">Email</label>
        <input id="email" type="email" formControlName="email" class="neo-input" placeholder="tu@email.com">
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <input id="password" type="password" formControlName="password" class="neo-input" placeholder="Min. 6 caracteres">
      </div>

      <button type="submit" class="neo-btn primary" [disabled]="loading || registerForm.invalid">
        {{ loading ? 'Creando...' : 'Registrarse' }}
      </button>
    </form>

    <div class="auth-links">
      <a routerLink="/login">¿Ya tienes cuenta? Ingresa aquí.</a>
    </div>
  </div>
</div>
