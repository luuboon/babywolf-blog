<div class="layout-container">
  <!-- HEADER -->
  <header class="layout-header">
    <div class="header-left">
      <button class="menu-toggle" (click)="toggleSidebar()" aria-label="Toggle sidebar">
        🎮
      </button>
      <a routerLink="/" class="brand-link">
        <h1 class="brand">🐺 BABYWOLF<span class="brand-accent">BLOG</span></h1>
      </a>
    </div>

    <div class="header-center">
      <div class="search-box">
        <span class="search-icon">🔎</span>
        <input
          type="text"
          [(ngModel)]="searchQuery"
          (keydown)="onSearchKeydown($event)"
          placeholder="Buscar posts..."
          class="search-input"
        />
      </div>
    </div>

    <div class="header-right">
      <ng-container *ngIf="currentUser$ | async as user; else guest">
        <a routerLink="/editor/new" class="header-btn write-btn">✍️ Escribir</a>
        <a routerLink="/profile" class="header-btn profile-btn">Mi Perfil</a>
        <a routerLink="/admin" class="header-btn admin-badge" *ngIf="isAdmin$ | async">Admin</a>
        <button (click)="logout()" class="header-btn logout-btn">Cerrar</button>
      </ng-container>
      <ng-template #guest>
        <a routerLink="/login" class="header-btn">Ingresar</a>
      </ng-template>
    </div>
  </header>

  <!-- BODY -->
  <div class="layout-body">
    <!-- SIDEBAR -->
    <aside class="sidebar" [class.collapsed]="isSidebarCollapsed">
      <div class="sidebar-toggle-wrapper">
        <button class="collapse-btn" (click)="toggleSidebar()" aria-label="Colapsar sidebar">
          {{ isSidebarCollapsed ? '→' : '←' }}
        </button>
      </div>

      <nav class="menu-section">
        <div class="section-title" *ngIf="!isSidebarCollapsed">Navegación</div>
        <div class="nav-list">
          @for (item of mainMenu; track item.label) {
            <a
              class="sidebar-link"
              [routerLink]="item.routerLink"
              routerLinkActive="active-link"
              [routerLinkActiveOptions]="{exact: item.routerLink === '/'}"
              [title]="item.label"
            >
              <span class="nav-icon">{{ item.icon }}</span>
              @if (!isSidebarCollapsed) {
                <span class="nav-label">{{ item.label }}</span>
              }
            </a>
          }
        </div>
      </nav>
    </aside>

    <!-- MAIN CONTENT -->
    <main class="content">
      <div class="content-wrapper">
        <router-outlet></router-outlet>
      </div>
    </main>
  </div>

  <!-- FOOTER -->
  <footer class="layout-footer">
    <div class="footer-content">
      <div class="footer-left">
        <span class="copyright">&copy; 2026 BabyWolf Blog. Todos los derechos reservados.</span>
      </div>
      <div class="footer-right">
        <div class="social-links">
          <a href="https://github.com" target="_blank" rel="noopener noreferrer" class="footer-link ext-link">GitHub</a>
          <a href="https://twitter.com" target="_blank" rel="noopener noreferrer" class="footer-link ext-link">Twitter</a>
          <a href="https://instagram.com" target="_blank" rel="noopener noreferrer" class="footer-link ext-link">Instagram</a>
        </div>
        <a routerLink="/terms" class="footer-link">Términos de Uso</a>
      </div>
    </div>
  </footer>
</div>
